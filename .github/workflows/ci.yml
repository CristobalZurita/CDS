# ==========================================
# Cirujano de Sintetizadores - CI/CD Pipeline
# ==========================================
# Runs on push to main and on pull requests.
# Tests backend (pytest) and frontend (vitest), then builds Docker images.

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # =====================
  # Frontend Tests & Build
  # =====================
  frontend:
    name: Frontend (Lint + Test + Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CDS_VUE3_ZERO
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: CDS_VUE3_ZERO/package-lock.json

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            npm ci && break
            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after 3 attempts" >&2
              exit 1
            fi
            sleep 10
          done

      - name: Lint
        run: echo "No linter configured (ESLint not installed)"
        continue-on-error: true

      - name: Run tests
        run: echo "No unit tests configured (Playwright E2E only — runs separately)"
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://cirujanodesintetizadores.cl/api/v1
          VITE_ENVIRONMENT: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: CDS_VUE3_ZERO/dist/
          retention-days: 7

  # =====================
  # Backend Tests
  # =====================
  backend:
    name: Backend (Lint + Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            pip install --upgrade pip \
              && pip install -r requirements.txt \
              && break
            if [ "$attempt" -eq 3 ]; then
              echo "pip install failed after 3 attempts" >&2
              exit 1
            fi
            sleep 10
          done

      - name: Run security scan
        run: |
          if [ -f ../tools/scan_unsafe.sh ]; then
            bash ../tools/scan_unsafe.sh
          fi
        continue-on-error: true

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        env:
          ENVIRONMENT: testing
          DATABASE_URL: sqlite:///./test_ci.db
          ENABLE_INSTRUMENT_AUTO_SYNC: "false"
          INSTRUMENT_SYNC_ON_STARTUP: "false"

  # =====================
  # Docker Build (only on main push)
  # =====================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && (vars.ENABLE_PROD_DEPLOY == 'true' || vars.ENABLE_STAGING_DEPLOY == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t cirujano-backend:latest ./backend

      - name: Build frontend image
        run: docker build -t cirujano-frontend:latest .

      - name: Verify images
        run: |
          docker images | grep cirujano
          echo "✅ Docker images built successfully"
