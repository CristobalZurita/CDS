name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  frontend-security:
    name: Frontend Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: NPM Audit
        run: npm audit --audit-level=high || true
      
      - name: ESLint Security
        run: npm run lint
      
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'cirujano-front'
          path: '.'
          format: 'JSON'
          args: >
            --enable-retired
            --scan node_modules/
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-security-report
          path: dependency-check-report.json

  backend-security:
    name: Backend Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety
      
      - name: Bandit Security Scan
        working-directory: ./backend
        run: bandit -r app/ -f json -o bandit-report.json || true
      
      - name: Safety Check
        working-directory: ./backend
        run: safety check --json || true
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-security-report
          path: backend/bandit-report.json

  secret-scanning:
    name: Secret Detection
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve TruffleHog diff range
        id: trufflehog-range
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=${{ github.event.repository.default_branch }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi
      
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ steps.trufflehog-range.outputs.base }}
          head: ${{ steps.trufflehog-range.outputs.head }}
          extra_args: --only-verified
      
      - name: GitLeaks Secret Scan
        uses: gitleaks/gitleaks-action@v2

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  container-security:
    name: Container Image Security
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -f Dockerfile -t cirujano-app:latest .
      
      - name: Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cirujano-app:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [frontend-security, backend-security, secret-scanning, code-quality, container-security]
    if: always()
    
    steps:
      - name: Security Report
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks Performed" >> $GITHUB_STEP_SUMMARY
          echo "✓ NPM Audit (frontend dependencies)" >> $GITHUB_STEP_SUMMARY
          echo "✓ ESLint Security" >> $GITHUB_STEP_SUMMARY
          echo "✓ OWASP Dependency Check" >> $GITHUB_STEP_SUMMARY
          echo "✓ Bandit (Python security)" >> $GITHUB_STEP_SUMMARY
          echo "✓ Safety Check (Python)" >> $GITHUB_STEP_SUMMARY
          echo "✓ TruffleHog (secrets)" >> $GITHUB_STEP_SUMMARY
          echo "✓ GitLeaks (secrets)" >> $GITHUB_STEP_SUMMARY
          echo "✓ SonarQube (code quality)" >> $GITHUB_STEP_SUMMARY
          echo "✓ Trivy (container security)" >> $GITHUB_STEP_SUMMARY
