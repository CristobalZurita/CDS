name: Unit Tests

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            npm ci && break
            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after 3 attempts" >&2
              exit 1
            fi
            sleep 10
          done
      
      - name: Run linter
        run: npm run lint
        continue-on-error: true
      
      - name: Run unit tests
        run: npm run test -- --run
      
      - name: Generate coverage report
        run: npm run test:coverage
        continue-on-error: true
      
      - name: Upload coverage to Codecov
        if: hashFiles('coverage/coverage-final.json') != ''
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
      
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-test-results-${{ matrix.node-version }}
          path: |
            coverage/
            test-results/

  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          for attempt in 1 2 3; do
            python -m pip install --upgrade pip \
              && pip install -r requirements.txt \
              && pip install pytest pytest-asyncio httpx \
              && break
            if [ "$attempt" -eq 3 ]; then
              echo "pip install failed after 3 attempts" >&2
              exit 1
            fi
            sleep 10
          done
      
      - name: Run backend tests
        working-directory: ./backend
        env:
          DATABASE_URL: sqlite:///./test_ci.db
          ENVIRONMENT: testing
          ENABLE_INSTRUMENT_AUTO_SYNC: "false"
          INSTRUMENT_SYNC_ON_STARTUP: "false"
        run: |
          pytest tests/ \
            --verbose \
            --junitxml=test-results.xml
      
      - name: Upload coverage to Codecov
        if: hashFiles('backend/coverage.xml') != ''
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage-${{ matrix.python-version }}
          fail_ci_if_error: false
      
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results-${{ matrix.python-version }}
          path: |
            backend/test-results.xml

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install Node dependencies
        run: |
          for attempt in 1 2 3; do
            npm ci && break
            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after 3 attempts" >&2
              exit 1
            fi
            sleep 10
          done
      
      - name: Build frontend
        run: npm run build
      
      - name: Run integration tests
        run: npm run test:integration
      
      - name: Archive integration results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: test-results/

  test-summary:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests, integration-tests]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Test Results
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Frontend Tests" >> $GITHUB_STEP_SUMMARY
          echo "✓ Passed on Node 20.x" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Backend Tests" >> $GITHUB_STEP_SUMMARY
          echo "✓ Passed on Python 3.11" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "✓ Passed E2E flow" >> $GITHUB_STEP_SUMMARY
