name: Secret scan (basic)

on:
  push:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repository hygiene scan
        run: |
          set -euo pipefail

          FOUND=0

          echo "Checking tracked local-only files..."
          while IFS= read -r path; do
            case "$path" in
              .env|backend/.env|.env.local|backend/.env.local|.env.production|*.db|*.sqlite|*.sqlite3|*.db-wal|*.db-shm|*.db-journal|backend/cirujano.log*|uploads/signatures/*|uploads/images/*)
                echo "Tracked local/sensitive artifact found: $path" >&2
                FOUND=1
                ;;
            esac
          done < <(git ls-files)

          echo "Checking known weak or legacy literals..."
          for LITERAL in \
            "REDACTED" \
            "REDACTED" \
            "supersecretkey-change-in-production-min-32-chars" \
            "dev-secret-key-change-in-production" \
            "change_me_in_production"
          do
            if git grep -n -- "$LITERAL" -- . ':(exclude).github/workflows/secret-scan.yml' ':(exclude)node_modules' ':(exclude)venv' ':(exclude)backend/.venv'; then
              FOUND=1
            fi
          done

          if [ "$FOUND" -ne 0 ]; then
            echo "Repository hygiene scan failed. Remove tracked local artifacts or known weak literals before merging." >&2
            exit 1
          fi

          echo "Repository hygiene scan passed."
