version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: diagnostic-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://diagnostic_user:diagnostic_pass@db:5432/diagnostic_db
      - UPLOAD_DIR=/app/uploads
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - ALLOWED_ORIGINS=http://localhost:80,http://localhost:8080
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - diagnostic-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: diagnostic-db
    environment:
      - POSTGRES_USER=diagnostic_user
      - POSTGRES_PASSWORD=diagnostic_pass
      - POSTGRES_DB=diagnostic_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - diagnostic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diagnostic_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend (Vue.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: diagnostic-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - diagnostic-network

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: diagnostic-nginx
    ports:
      - "443:443"
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./uploads:/var/www/uploads:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - diagnostic-network
    profiles:
      - production

  # Redis Cache (optional)
  redis:
    image: redis:7-alpine
    container_name: diagnostic-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - diagnostic-network
    profiles:
      - cache

  # Backup Service (optional)
  backup:
    image: postgres:15-alpine
    container_name: diagnostic-backup
    environment:
      - PGUSER=diagnostic_user
      - PGPASSWORD=diagnostic_pass
      - PGDATABASE=diagnostic_db
      - PGHOST=db
    volumes:
      - ./backups:/backups
    entrypoint: |
      sh -c '
      while true; do
        echo "Running backup at $(date)"
        pg_dump -h db -U diagnostic_user diagnostic_db | gzip > /backups/backup_$(date +%Y%m%d_%H%M%S).sql.gz
        find /backups -name "backup_*.sql.gz" -mtime +30 -delete
        echo "Backup complete. Sleeping for 24 hours..."
        sleep 86400
      done
      '
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - diagnostic-network
    profiles:
      - backup

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  diagnostic-network:
    driver: bridge

# Usage:
# Development:
#   docker-compose up -d
#
# Production (with nginx):
#   docker-compose --profile production up -d
#
# With cache:
#   docker-compose --profile cache up -d
#
# With backup:
#   docker-compose --profile backup up -d
#
# All features:
#   docker-compose --profile production --profile cache --profile backup up -d
